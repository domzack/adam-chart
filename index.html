<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Adam Chart - Gráfico OHLCV + WebSocket</title>
    <link rel="stylesheet" href="public/style.css">
    <script src="public/vue.js"></script>
    <script src="public/trading-vue.js"></script>
</head>

<body>
    <div id="app">
        <div class="toolbar">
            <button v-for="tf in availableTfs" :key="tf" :class="{active: currentTimeframe === tf}"
                @click="changeTimeframe(tf)">
                {{ tfLabel(tf) }}
            </button>
        </div>
        <div class="chart-container">
            <trading-vue :data="chart" :width="width" :height="height" :color-back="'#111'"
                :title-txt="'Adam-chart'"></trading-vue>
        </div>
    </div>

    <script src="public/main.js"></script>
</body>

</html>
